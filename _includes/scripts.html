


<!-- Les bibliothèques JS (jquery, skel, init, localize) sont chargées dans head.html, ne pas les recharger ici -->
<script type="text/javascript">
    // Traduction automatique au chargement selon la langue du navigateur.
    // Ne pas passer d'option "callback" ici : le plugin lui délèguerait
    // l'application des traductions et la page resterait en français.
    try {
        $("[data-localize]").localize("translation/localize", {
            timeout: 3000,
            // Le contenu des pages est déjà en français : inutile de télécharger
            // des traductions pour les navigateurs français
            skipLanguage: /^fr/
        });
    } catch (error) {
        console.log('Localization failed to load, continuing without translations');
    }

    function changeLang(lang) {
        try {
            $("[data-localize]").localize("translation/localize", {
                language: lang,
                timeout: 3000
            });
        } catch (error) {
            console.log('Language change failed:', error);
        }
    }
</script>

{% if page.layout == 'faq' %}
<script type="text/javascript">
    // La page FAQ contient un bloc par langue : on affiche celui de la langue courante
    (function () {
        var faqLangs = ['fr', 'en', 'de', 'es', 'cn'];
        function showFaqLang(lang) {
            if (faqLangs.indexOf(lang) === -1) lang = 'fr';
            $('.faq-lang').hide().filter('[data-lang="' + lang + '"]').show();
        }
        var baseChangeLang = changeLang;
        changeLang = function (lang) {
            baseChangeLang(lang);
            showFaqLang(lang);
        };
        // Le reste de la page se traduit automatiquement selon la langue du
        // navigateur (appel localize() initial ci-dessus) : la FAQ s'aligne dessus.
        showFaqLang((navigator.language || navigator.userLanguage || 'fr').substring(0, 2));
    })();
</script>
{% endif %}
